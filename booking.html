<!DOCTYPE html>
<html lang="en" class="scroll-smooth dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Your Visit | The Peaky Barbers</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brandDark: '#111111',
            brandSurface: '#1A1A1A',
            brandGold: '#C5A059',
            brandGoldLight: '#F5E0A3'
          },
          fontFamily: {
            sans: ['Montserrat', 'sans-serif'],
            serif: ['"Cormorant Garamond"', 'serif'],
          },
          boxShadow: {
            'glow': '0 0 20px -5px rgba(197, 160, 89, 0.4)',
            'glow-strong': '0 0 30px -5px rgba(197, 160, 89, 0.6)',
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #111111; color: #F3F4F6; }
    .text-gradient-gold {
      background: linear-gradient(to right, #C5A059, #F5E0A3);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    input[type="radio"]:checked + div {
      border-color: #C5A059;
      background-color: rgba(197, 160, 89, 0.1);
      transform: translateY(-2px);
      box-shadow: 0 0 15px -3px rgba(197, 160, 89, 0.3);
    }
    input[type="radio"] + div {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .bento-card {
      background: rgba(45, 45, 45, 0.4);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 1rem;
    }
  </style>
</head>
<body class="antialiased font-sans flex flex-col min-h-screen">

  <header class="border-b border-white/5 py-8 px-4 md:px-8 bg-brandDark/80 backdrop-blur-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <a href="index.html" class="flex items-center gap-4 group">
        <div class="w-12 h-12 transition-all duration-500 group-hover:scale-105">
          <img src="images/logo.svg" alt="The Peaky Barbers Logo" class="w-full h-full">
        </div>
        <div class="flex flex-col">
          <span class="text-[10px] text-brandGold tracking-[0.4em] uppercase font-bold">By Order Of</span>
          <span class="text-xl font-serif font-bold tracking-widest text-white uppercase">The Peaky Barbers</span>
        </div>
      </a>
      <a href="index.html" class="text-[10px] uppercase tracking-[0.3em] text-gray-400 hover:text-brandGold transition-colors font-bold">Cancel Session</a>
    </div>
  </header>


  <main class="flex-grow max-w-7xl mx-auto w-full px-4 py-12 grid lg:grid-cols-12 gap-12">
    <section class="lg:col-span-4 space-y-8 h-fit lg:sticky top-32">
      <div class="space-y-4 text-center lg:text-left">
        <h1 class="text-4xl lg:text-5xl font-serif font-bold leading-tight">Book Your <br><span class="text-gradient-gold italic">Experience</span></h1>
        <p class="text-gray-400 font-light leading-relaxed">Select your preferred artisan, date, and time. Secure your spot in the city's premier grooming sanctuary.</p>
      </div>
      <div class="space-y-4 pt-4 hidden lg:block">
        <div class="p-5 bento-card flex items-center gap-4">
          <div class="w-12 h-12 bg-brandGold/10 rounded-full flex items-center justify-center text-brandGold border border-brandGold/20">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
          </div>
          <div>
            <h4 class="font-bold text-white font-serif text-lg">Punctual Service</h4>
            <p class="text-xs text-gray-400">Zero wait time guaranteed</p>
          </div>
        </div>
      </div>
    </section>

    <section class="lg:col-span-8 bento-card p-6 md:p-10">
      <form action="#" class="space-y-12">
        <div>
          <h3 class="text-xl font-serif font-bold mb-6 flex items-center gap-3 text-white border-b border-white/5 pb-4">
            <span class="w-8 h-8 rounded-full bg-brandGold/20 text-brandGold flex items-center justify-center text-sm font-sans font-bold border border-brandGold/40">1</span>
            Select Master Barber
          </h3>
          <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
            <label class="relative cursor-pointer">
              <input type="radio" name="barber" value="marcus" class="peer sr-only">
              <div class="block w-full p-2 rounded-xl border border-white/10 bg-brandDark">
                <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuBqcWmmTpWd0hzDOk1GmO5GV61J-QYhFgI1MaE_9c9N-Qwf_P2cURrEjTAS5TmnK_zjx1_eb_NjE7cUmc5onAA8PDE4ef1c5eSYokL4tBbn-WvgYYoJNSIxshllQyZXw74QzYCxr4yDPfD0_FVpMkp4nY3Y5glPg8rOxNUWI4MSXy9zIMt9N6oGOMfdp9dQvUsfvDI5AypoUM5e4s5fWsnGjwE4UCcRA3UzOjEhVRkunGW6Bg_UV45qtKl1mSpmbA1gEcjraJPxGw98" alt="Marcus" class="w-full aspect-square object-cover rounded-lg mb-3">
                <p class="text-center text-sm font-semibold">Marcus V.</p>
              </div>
            </label>
            <label class="relative cursor-pointer">
              <input type="radio" name="barber" value="elias" class="peer sr-only" checked>
              <div class="block w-full p-2 rounded-xl border border-white/10 bg-brandDark">
                <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuCdkq_febjdKepGrEDIuPCz4gDnqqDIEP4kn2ZwuL4weZNoK-0o1ex8gfn-1AXq9tbpNdDJtR5vrsjKt84KK3ElFMWoZowOtq2isZxKiEU96QZU6PByZsk1fcgn5-aKOopav7bGLqF8XFKdk3upPfEUPMZT6jOPI8AmDkLrFwhnQez_bYNm9N1yxpYIH_724YhMImsZIU3rqyMmqXPj6-8Qbi1PtbmbsrxH-EL56CP9fvW1UNnwwNsXkbUVfK0NY00Qlm2Hgv8tMXYb" alt="Elias" class="w-full aspect-square object-cover rounded-lg mb-3">
                <p class="text-center text-sm font-semibold">Elias Thorne</p>
              </div>
            </label>
            <label class="relative cursor-pointer">
              <input type="radio" name="barber" value="any" class="peer sr-only">
              <div class="block w-full h-full min-h-[140px] p-2 rounded-xl border border-white/10 bg-brandDark flex flex-col items-center justify-center">
                <div class="w-12 h-12 rounded-full border border-dashed border-gray-500 flex items-center justify-center mb-3 text-gray-400">
                  <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                </div>
                <p class="text-center text-sm font-semibold">First Available</p>
              </div>
            </label>
          </div>
        </div>
        <div>
          <h3 class="text-xl font-serif font-bold mb-6 flex items-center gap-3 text-white border-b border-white/5 pb-4">
            <span class="w-8 h-8 rounded-full bg-brandGold/20 text-brandGold flex items-center justify-center text-sm font-sans font-bold border border-brandGold/40">2</span>
            Select Time
          </h3>
          <div class="grid grid-cols-3 sm:grid-cols-4 gap-3">
            <label class="cursor-pointer font-medium text-gray-300">
              <input type="radio" name="time" value="09:00" class="peer sr-only">
              <div class="py-3 text-center border border-white/10 bg-brandDark rounded-lg text-sm">09:00 AM</div>
            </label>
            <label class="cursor-pointer font-medium text-gray-300">
              <input type="radio" name="time" value="10:30" class="peer sr-only">
              <div class="py-3 text-center border border-white/10 bg-brandDark rounded-lg text-sm">10:30 AM</div>
            </label>
            <label class="cursor-pointer font-medium text-gray-300">
              <input type="radio" name="time" value="13:00" class="peer sr-only" checked>
              <div class="py-3 text-center border border-white/10 bg-brandDark rounded-lg text-sm">01:00 PM</div>
            </label>
          </div>
        </div>
        <div>
          <h3 class="text-xl font-serif font-bold mb-6 flex items-center gap-3 text-white border-b border-white/5 pb-4">
            <span class="w-8 h-8 rounded-full bg-brandGold/20 text-brandGold flex items-center justify-center text-sm font-sans font-bold border border-brandGold/40">3</span>
            Your Details
          </h3>
          <div class="grid md:grid-cols-2 gap-6">
            <div class="space-y-2">
              <label class="text-xs font-semibold text-gray-400 uppercase tracking-widest pl-1" for="name">Full Name</label>
              <input type="text" id="name" class="w-full bg-brandDark border border-white/10 focus:border-brandGold focus:ring-1 focus:ring-brandGold rounded-lg p-3 text-white placeholder-gray-600 transition-colors" placeholder="John Doe">
            </div>
            <div class="space-y-2">
              <label class="text-xs font-semibold text-gray-400 uppercase tracking-widest pl-1" for="phone">Phone Number</label>
              <input type="tel" id="phone" class="w-full bg-brandDark border border-white/10 focus:border-brandGold focus:ring-1 focus:ring-brandGold rounded-lg p-3 text-white placeholder-gray-600 transition-colors" placeholder="+91 00000 00000">
            </div>
          </div>
        </div>
        <div class="pt-6">
          <button type="button" class="w-full bg-brandGold text-brandDark font-bold text-lg py-4 rounded-xl shadow-glow transition-all transform hover:-translate-y-1">Confirm Appointment</button>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
